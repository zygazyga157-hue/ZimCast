services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST}
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - STREAM_BASE_URL=http://mediamtx:8888
      - NEXT_PUBLIC_STREAM_BASE_URL=${NEXT_PUBLIC_STREAM_BASE_URL}
      - STREAM_TOKEN_SECRET=${STREAM_TOKEN_SECRET}
      - PAYNOW_INTEGRATION_ID=${PAYNOW_INTEGRATION_ID}
      - PAYNOW_INTEGRATION_KEY=${PAYNOW_INTEGRATION_KEY}
      - PAYNOW_RESULT_URL=${PAYNOW_RESULT_URL}
      - PAYNOW_RETURN_URL=${PAYNOW_RETURN_URL}
      # SMTP (from .env)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      # LiveScore API
      - LIVESCORE_API_KEY=${LIVESCORE_API_KEY}
      - LIVESCORE_API_SECRET=${LIVESCORE_API_SECRET}
      # Media S3 / R2
      - MEDIA_S3_ENDPOINT=${MEDIA_S3_ENDPOINT}
      - MEDIA_S3_REGION=${MEDIA_S3_REGION}
      - MEDIA_S3_BUCKET=${MEDIA_S3_BUCKET}
      - MEDIA_S3_ACCESS_KEY_ID=${MEDIA_S3_ACCESS_KEY_ID}
      - MEDIA_S3_SECRET_ACCESS_KEY=${MEDIA_S3_SECRET_ACCESS_KEY}
      - MEDIA_PUBLIC_BASE_URL=${MEDIA_PUBLIC_BASE_URL}
    platform: "windows/amd64"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-zimcast}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  mediamtx:
    build:
      context: .
      dockerfile: docker/Dockerfile.mediamtx
    ports:
      - "8888:8888"  # HLS
      - "9000:9000"  # SRT
      - "9997:9997"  # Control API
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - recordings:/recordings
    depends_on:
      - app
    restart: unless-stopped
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
  recordings:
